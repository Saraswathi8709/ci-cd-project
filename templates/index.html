<!DOCTYPE html>
<html>
<head>
    <title>CI/CD Project</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
            width:400px;
        }

        h1{
            color:#333;
        }

        p{
            font-size:18px;
            color:#666;
        }

        .status{
            margin-top:20px;
            padding:10px;
            background:#e8f5e9;
            color:#2e7d32;
            border-radius:5px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>CI/CD Pipeline</h1>
    <p>Flask Application with Automated Testing</p>

    <div class="status">
        ✅ CI/CD Pipeline is Running Successfully
    </div>
</div>

</body>
</html>
